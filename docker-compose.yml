
services:
  haproxy:
      restart: always
      image: 'ghcr.io/tomdess/docker-haproxy-certbot:master'
      container_name: haproxy
      environment:
          - CERT1=www.your.domain.com
          - CERT2=torrent.your.domain.com
          - CERT3=jellyfin.your.domain.com
          - EMAIL=your.email@gmail.com
          # - STAGING=false
      volumes:
          - ${SERVER_DATA}/letsencrypt:/etc/letsencrypt
          - ${SERVER_CONFIG}/haproxy.cfg:/etc/haproxy/haproxy.cfg
      ports:
          - '80:80'
          - '443:443'

  rutorrent:
    image: crazymax/rtorrent-rutorrent:latest
    restart: always
    environment:
      - TZ=Europe/Paris
      - PUID=1000
      - PGID=1000
      - RT_INC_PORT=54324
    ports:
      - "54324:54324"
      # - "8080:8080" # internal redirect with haproxy
    volumes:
      - ${SERVER_CONFIG}/rtorrent.rc:/data/rtorrent/.rtorrent.rc
      - ${SERVER_DATA}/rutorrent_data:/data
      - ${SERVER_DATA}/rutorrent_downloads:/downloads
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000

  httpshare:
    image: httpd
    restart: always
    volumes:
      - "${SERVER_CONFIG}/robots.txt:/usr/local/apache2/htdocs/robots.txt:ro"
      - "${SERVER_DATA}/http_root:/usr/local/apache2/htdocs/:rw" # empty folder
      - "${SERVER_DATA}/rutorrent_downloads/complete:/usr/local/apache2/htdocs/rutorrent:ro"
    # ports:
    #   - '80:80' # internal redirect with haproxy

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      # - 8096:8096/tcp # internal redirect with haproxy
      # - 8920:8920/tcp # https - disabled by default ; ignored tthanks to haproxy
      - 7359:7359/udp
    volumes:
      - ${SERVER_DATA}/jellyfin_config:/config
      - ${SERVER_DATA}/jellyfin_cache:/cache
      - type: bind
        source: ${SERVER_DATA}/rutorrent_downloads/complete
        target: /media
    restart: 'unless-stopped'
    # Optional - alternative address used for autodiscovery
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.your.domain.com
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: always
    ports:
      # - 32400:32400 # internal redirect with haproxy
      - 1900:1900/udp
      - 5353:5353/udp
      - 8324:8324
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - VERSION=docker
      # - PLEX_CLAIM=
    volumes:
      - ${SERVER_DATA}/plex_config:/config
      - ${SERVER_DATA}/plex_transcode/:/plex_transcode:rw
      - ${SERVER_DATA}/rutorrent_downloads/complete:/media:ro
